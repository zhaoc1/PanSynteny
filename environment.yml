name: pansynteny
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # R and essential tools
  - r-base>=4.5.1

  # Core tidyverse packages
  - r-tidyverse>=2.0.0
  - r-dplyr>=1.1.0
  - r-tidyr>=1.3.0
  - r-purrr>=1.0.0
  - r-stringr>=1.5.0
  - r-ggplot2>=3.4.0
  - r-readr>=2.1.0
  - r-tibble>=3.2.0

  # Visualization packages
  - r-viridis>=0.6.0
  - r-rcolorbrewer>=1.1
  - r-scales>=1.2.0
  - r-gridextra>=2.3
  - r-pheatmap>=1.0.12
  - r-ggraph>=2.1.0
  - r-gggenes>=0.5.1

  # Graph analysis
  - r-igraph>=1.5.0

  # Data manipulation
  - r-data.table>=1.14.0

  # Utilities
  - r-glue>=1.6.0
  - r-fs>=1.6.0

  # Reporting
  - r-pander>=0.6.5
  - r-knitr>=1.42
  - r-rmarkdown>=2.20

  # PDF output support
  - r-tinytex>=0.45

  # System tools (if needed)
  - pandoc>=2.19

  # Python tools — required by Step 0a (build_genome_catalog.py +
  # gff_to_genes.py). pyyaml parses <config.yaml>; gffutils backs the Prokka
  # GFF3 -> .genes conversion.
  - python>=3.10
  - pip
  - pyyaml>=6.0
  - gffutils>=0.14
