job:
  species_id:    "102321"                          # MIDAS species id
  input_dir:     "/path/to/inputs"                 # holds the two user-authored files for this run: this YAML config + the focal_meta TSV.
  proj_dir:      "/path/to/proj_dir"               # output root, used as-is. Include the species_id in the path if you want per-species isolation, e.g. "/path/to/proj_dir/102321".
  parallel_jobs: 2                                 # -P for build_neighbor_lists.sh's xargs fan-out across focals; cap at ~8 on shared FS

data:
  data_dir:            "/path/to/data"                                                       # species-shared caches land under {data_dir}/{species_id}
  midasdb_dir:         "/path/to/midas2db-uhgg-v2"                                           # path to the midasdb directory
  focal_meta:          "{input_dir}/focal_table.tsv"                                         # user-provided focal-gene metadata; prepare.R reads from here
  clusters_80_updated: "{midasdb_dir}/pangenomes/{species_id}/clusters_80_info_updated.tsv"  # copied into the local data_dir
  n_genes:             20                                                                    # max neighbors extracted each side of a focal gene along the contig (get_neighbor.sh)

sources:         # consumed by build_genome_catalog.py (config.R ignores it). Single-source (Case 1) shown below; for multi-source + per-source local placeholders, see docs/USER_GUIDE.md section Case 2.
  - name:        uhgg
    type:        midas
    genes_info:  "{midasdb_dir}/pangenomes/{species_id}/genes_info.tsv"
    c80_col:     6
    genomes_dir: "{midasdb_dir}/gene_annotations/{species_id}"

prepare:
  score_col:        ""           # column in corrected_genes used to score genes; one of {cor_to_b, beta}
  inclusion_cutoff: ""           # min |score_col| for any gene to be retained in focal_c80_df
  focal_cutoff:     ""           # min |score_col| for a gene to be marked is_focal = TRUE

mwas:
  midas_dir:    ""               # legacy: feeds the MWAS block in model.R; unused by the current pipeline

neighbor:
  focal_min_genomes:        10    # min genomes a Step 1 neighborhood pattern must appear in to survive
  focal_min_total_genomes:  20    # min total genomes a focal must be present in
  min_positions:            5     # min surviving relative positions per focal in compute_relative_positions
  upper_bound:              10
  min_left_neighbors:       2
  min_right_neighbors:      2
  use_strict:               ~
  min_group_proportion:     0.05  # min per-group genome proportion to retain a Step 1 neighborhood pattern
  coverage_warn_threshold:  0.8   # warn if surviving Step 1 groups cover less than this fraction of total

path:
  path_min_genomes:  20         # min strains a canonical operon must be backed by (Step 3 gate)
  truncation_cutoff: 0.8        # length / centroid_length below which a gene counts as truncated (Step 3)

blocks:
  skip_block:  true             # set true to skip Step 6 block extraction (pipeline.R short-circuits the call; Step 5 figures still render)
  allow_gaps:  2                # max non-hit positions allowed inside one block (aggregate_blocks)
  min_overlap: 1                # min LCS length to call two blocks "overlap" (rank_block_representatives)
  min_shared:  2                # diagnostic threshold for substring-overlap pairs (diagnose_rep_overlaps)

parse:
  seed: 616                     # RNG seed for the per-fine-isoform exemplar genome draw (Step 4)
  fine_coverage_ratio: 0.25     # n_fine_genomes >= ceiling(path_min_genomes * ratio) to survive (Step 4)
  fill_modes:                   # one PDF per mode; subset of beta / sample_prevalence / cor_to_b / fill_gene / gene_label / focal_type / focal_label (Step 5)
    - gene_label

plot:
  gene_padding_bp: 100          # bp gap between genes in Step 1 + Step 5 gggenes layouts
